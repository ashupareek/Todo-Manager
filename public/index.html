<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-doodle left-dot"></div>
    <div class="bg-doodle left-box"></div>
    <div class="bg-doodle right-dot"></div>
    <div class="bg-doodle right-box"></div>

    <main class="layout">
      <header class="topbar">
        <div class="brand-block">
          <p class="brand">Todo Manager</p>
          <p class="brand-meta">api@todo.local</p>
        </div>
        <div class="top-actions">
          <button id="top-signup" class="mini-link" type="button">Sign up</button>
          <button class="btn warm" type="button">Request Demo</button>
        </div>
      </header>

      <section class="hero">
        <p class="eyebrow">Agent Console</p>
        <h1>Sign in to your account</h1>
        <p class="subtitle">Access todo lists and manage tasks with role-protected API routes.</p>
      </section>

      <section id="feedback" class="feedback hidden"></section>

      <section id="auth-card" class="card">
        <div class="card-header">
          <h2>Agent Login</h2>
          <p class="card-subtitle">Enter your credentials to continue.</p>
        </div>
        <div class="tabs">
          <button id="login-tab" class="tab active" type="button">Login</button>
          <button id="signup-tab" class="tab" type="button">Sign up</button>
        </div>
        <form id="auth-form" class="stack">
          <label class="field">
            Username
            <input id="username-input" name="username" required />
          </label>
          <label class="field">
            Password
            <input id="password-input" name="password" type="password" required />
          </label>
          <button id="auth-submit" class="btn primary" type="submit">Login</button>
        </form>
      </section>

      <section id="app-card" class="card hidden">
        <div class="card-header split">
          <div>
            <h2>Dashboard</h2>
            <p id="current-user"></p>
          </div>
          <button id="logout-button" class="btn ghost" type="button">Logout</button>
        </div>

        <form id="create-list-form" class="stack form-row">
          <label class="field grow">
            New list name
            <input id="list-name-input" name="name" required />
          </label>
          <button class="btn primary" type="submit">Create list</button>
        </form>

        <div class="list-header split">
          <h3>Your lists</h3>
          <button id="refresh-lists-button" class="btn ghost" type="button">Refresh</button>
        </div>
        <div id="lists-container" class="stack"></div>
      </section>
    </main>

    <template id="list-template">
      <article class="list-card">
        <header class="split">
          <h4 class="list-name"></h4>
          <span class="count"></span>
        </header>
        <form class="rename-list-form form-row">
          <label class="field grow">
            Rename list
            <input name="name" required />
          </label>
          <button class="btn subtle" type="submit">Save</button>
        </form>
        <form class="add-todo-form form-row">
          <label class="field grow">
            New todo
            <input name="task" required />
          </label>
          <button class="btn subtle" type="submit">Add</button>
        </form>
        <ul class="todo-list"></ul>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
